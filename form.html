<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>University Registration Form</h1>
    <p>Please fill out the form below to register for the university:</p>
    <hr>
    <form>
        <h2>Personal Details</h2>
        <label for="name">First Name: required</label>
        <input type="text" id="name" name="name" placeholder="Enter your first name">
        <br><br>
        <label for="surname">Last Name:</label>
        <input type="text" id="surname" name="surname" placeholder="Enter your last name">
        <br><br>
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob">
        <br><br>
        <h3>Gender</h3>
        <label for="male">Male</label>
        <input type="radio" id="male" name="gender" value="male">
        <br>
        <label for="female">Female</label>
        <input type="radio" id="female" name="gender" value="female">
        <br>
        <label for="other">Other</label>
        <input type="radio" id="other" name="gender" value="other">
        <br><br>
        <h3>Upload Your Photo</h3>
        <input type="file" id="photo" name="photo" accept="image/*">
        <hr>
        <h2>Contact Details</h2>
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" placeholder="Enter your email address">
        <br><br>
        <label for="phone">Phone Number:</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number">
        <br><br>
        <label for="Address">Mailing Address:</label>
        <br>
        <textarea id="Address" rows="10" cols="30"></textarea>
        <hr>
        <h2>Academic Information</h2>
        <label for="course">Select Course:</label>
        <select id="course" name="course">
            <option value="computer-science">Computer Science</option>
            <option value="mathematics">Mathematics</option>
            <option value="physics">Physics</option>
            <option value="chemistry">Chemistry</option>
        </select>
        <br>
        <h3>Extracurricular Activities</h3>
        <label for="sports">Sports</label>
        <input type="checkbox" id="sports" name="activities" value="sports">
        <br>
        <label for="music">Music</label>
        <input type="checkbox" id="music" name="activities" value="music">
        <br>
        <label for="technology">Technology</label>
        <input type="checkbox" id="Technology" name="activities" value="technology">
        <br><br>
        <hr>
        <h2>Create Your Account </h2>
        <label for="pass">Create Password:</label>
        <input type="password" id="pass" name="pass">
        <br><br>
        <label for="secu">Security Answer</label>
        <input type="text" name="Security" id="secu">
        <hr>
        <button type="submit">Submit</button>
        <button type="reset">Clear Form</button>


    </form>
    
</body>
</html>
